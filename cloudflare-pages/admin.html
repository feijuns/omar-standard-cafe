<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omar Standard Cafe 訂單管理</title>
  <style>
@font-face {
  font-family: "Gotham OSC";
  src: url("./fonts/Gotham-Medium.otf") format("opentype");
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}

:root {
  --ink: #303943;
  --muted: #6d737a;
  --paper: #ffffff;
  --soft: #f8f7f5;
  --line: #ddd8d1;
  --warm: #756452;
  --accent: #6f5841;
  --success: #315f4e;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: "Gotham OSC", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  letter-spacing: 0;
}
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
h1, h2, h3, h4, p { margin: 0; }

.site-header {
  position: sticky;
  top: 0;
  z-index: 20;
  min-height: 66px;
  padding: 10px clamp(16px, 4vw, 42px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  background: rgba(255, 255, 255, 0.96);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(18px);
}

.brand {
  flex: 0 1 auto;
  min-width: 0;
}

.brand img {
  width: clamp(154px, 18vw, 232px);
  height: auto;
  display: block;
}

.nav {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  min-width: 0;
  flex: 0 1 auto;
}

.nav a,
.nav button,
.chip,
.quiet-button,
.primary-button,
.icon-button,
.flavor-toggle {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--paper);
  color: var(--ink);
  text-decoration: none;
}

.nav a,
.nav button,
.chip,
.quiet-button,
.primary-button,
.flavor-toggle {
  min-height: 34px;
  padding: 8px 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 13px;
  line-height: 1;
}

.nav a,
.nav button {
  flex: 0 0 auto;
}

.primary-button {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}

.chip:hover,
.quiet-button:hover,
.nav a:hover,
.nav button:hover,
.flavor-toggle:hover {
  border-color: var(--ink);
}

.chip.active,
.flavor-toggle[aria-expanded="true"] {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}

.icon-button {
  width: 34px;
  height: 34px;
  padding: 0;
  line-height: 1;
}

.page-shell {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(310px, 370px);
  gap: clamp(18px, 4vw, 40px);
  padding: clamp(20px, 3vw, 42px);
  align-items: start;
}

.intro {
  padding-bottom: 22px;
  border-bottom: 1px solid var(--line);
}

.intro-copy {
  display: grid;
  max-width: 900px;
  gap: 14px;
}

.eyebrow {
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
}

h1 {
  max-width: none;
  font-size: clamp(28px, 3vw, 40px);
  line-height: 1.12;
  font-weight: 500;
  word-break: keep-all;
  overflow-wrap: normal;
}

@media (min-width: 821px) {
  h1 {
    white-space: nowrap;
  }
}

.intro p,
.section-lead {
  color: var(--muted);
  line-height: 1.8;
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 14px;
}

.info-strip {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(18px, 4vw, 54px);
  align-items: center;
  margin-top: 6px;
  padding-top: 12px;
  color: var(--muted);
  border-top: 1px solid #ebe7e1;
}

.info-item {
  display: grid;
  grid-template-columns: 26px minmax(0, auto);
  gap: 10px;
  align-items: start;
  min-width: 178px;
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
}

.info-icon {
  width: 26px;
  height: 26px;
  display: block;
  margin-top: 0;
  background-position: center;
  background-repeat: no-repeat;
  background-size: 26px 26px;
}

.info-item:nth-child(1) .info-icon {
  background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2726%27%20height%3D%2726%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%20stroke%3D%27%23756452%27%20stroke-width%3D%271.7%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%3E%3Cpath%20d%3D%27M3%207h11v8H3z%27%2F%3E%3Cpath%20d%3D%27M14%2010h3l3%203v2h-6z%27%2F%3E%3Ccircle%20cx%3D%277%27%20cy%3D%2717%27%20r%3D%271.7%27%2F%3E%3Ccircle%20cx%3D%2717%27%20cy%3D%2717%27%20r%3D%271.7%27%2F%3E%3C%2Fsvg%3E");
}

.info-item:nth-child(2) .info-icon {
  background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2726%27%20height%3D%2726%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%20stroke%3D%27%23756452%27%20stroke-width%3D%271.7%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%3E%3Cpath%20d%3D%27M8%2018c5%202%2010-1%209-6-.6-4-4.6-7-8.5-5.6C4.5%207.8%203.4%2015.9%208%2018z%27%2F%3E%3Cpath%20d%3D%27M9%206c1%203%204%204%207%205%27%2F%3E%3Cpath%20d%3D%27M8%203c-.8%201-.8%201.8%200%202.7%27%2F%3E%3Cpath%20d%3D%27M12%202.5c-.8%201-.8%201.8%200%202.7%27%2F%3E%3C%2Fsvg%3E");
}

.info-item:nth-child(3) .info-icon {
  background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2726%27%20height%3D%2726%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%20stroke%3D%27%23756452%27%20stroke-width%3D%271.7%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%3E%3Cpath%20d%3D%27M12%203l7%203v5c0%204.3-2.8%207.5-7%209-4.2-1.5-7-4.7-7-9V6z%27%2F%3E%3Cpath%20d%3D%27M9%2012l2%202%204-4%27%2F%3E%3C%2Fsvg%3E");
}

.info-item strong {
  display: block;
  color: var(--ink);
  font-size: 12px;
  line-height: 1.4;
}

.info-item span {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.5;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 20px 0 18px;
}

.products {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.product-card {
  display: grid;
  grid-template-columns: 168px minmax(0, 1fr);
  gap: 16px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--paper);
}

.photo-slot {
  aspect-ratio: 2 / 3;
  overflow: hidden;
  border: 1px solid #e6e2dd;
  border-radius: 6px;
  background: #f7f6f4;
}

.photo-slot img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: center;
}

.assorted-card .photo-slot {
  display: grid;
  place-items: center;
  padding: 22px;
}

.assorted-card .photo-slot img {
  height: auto;
  object-fit: contain;
}

.product-body {
  display: grid;
  min-width: 0;
  gap: 10px;
  align-content: start;
}

.product-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: var(--muted);
  font-size: 12px;
}

.product-name {
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 22px;
  line-height: 1.25;
  font-weight: 700;
}

.notes,
.info,
.recommendation,
.flavor-detail {
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
}

.notes {
  color: var(--ink);
  font-size: 14px;
  line-height: 1.7;
}

.recommendation {
  padding: 10px 12px;
  border: 1px solid #e3d8c9;
  border-radius: 6px;
  background: #fbf6ee;
  color: var(--accent);
  font-size: 13px;
  line-height: 1.65;
}

.flavor-toggle { width: fit-content; }

.flavor-detail {
  display: grid;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  color: var(--ink);
  font-size: 13px;
  line-height: 1.65;
}

.flavor-detail[hidden] { display: none; }
.flavor-detail h4 { font-size: 14px; font-weight: 700; }
.score-list { display: grid; gap: 9px; }

.score-row {
  display: grid;
  grid-template-columns: 44px 58px minmax(0, 1fr);
  gap: 8px;
  align-items: center;
}

.score-row em {
  color: var(--ink);
  font-style: normal;
}

.score-meter {
  grid-column: 1 / -1;
  height: 5px;
  overflow: hidden;
  border-radius: 999px;
  background: #e9e5df;
}

.score-meter span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--warm);
}

.info {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.65;
}

.variant-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.variant-grid button {
  min-height: 42px;
  border: 1px solid var(--ink);
  border-radius: 6px;
  background: var(--paper);
  color: var(--ink);
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 12px;
  line-height: 1.35;
}

.variant-grid button:hover {
  background: var(--ink);
  color: var(--paper);
}

.cart-panel {
  position: sticky;
  top: 88px;
  display: grid;
  gap: 16px;
  padding: 18px;
  border: 1px solid var(--ink);
  border-radius: 6px;
  background: var(--paper);
}

.section-heading {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 20px;
}

.cart-items {
  display: grid;
  gap: 10px;
  max-height: 370px;
  overflow: auto;
  padding-right: 4px;
}

.empty {
  padding: 24px 16px;
  border: 1px dashed var(--line);
  border-radius: 6px;
  color: var(--muted);
  text-align: center;
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 13px;
}

.cart-item {
  display: grid;
  gap: 10px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
}

.cart-item-title {
  display: grid;
  gap: 3px;
  min-width: 0;
}

.cart-item-title strong {
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 14px;
  line-height: 1.35;
}

.cart-item-title span {
  color: var(--muted);
  font-size: 12px;
}

.cart-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.stepper {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.stepper span {
  min-width: 24px;
  text-align: center;
}

.line-total { font-size: 14px; }

.summary {
  display: grid;
  gap: 9px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
}

.summary-row {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  color: var(--muted);
  font-size: 13px;
}

.summary-row.notice {
  display: block;
  padding: 9px 10px;
  border: 1px solid #e3d8c9;
  border-radius: 6px;
  background: #fbf6ee;
  color: var(--accent);
}

.summary-row.total {
  color: var(--ink);
  font-size: 22px;
}

.field { display: grid; gap: 7px; }
label { color: var(--muted); font-size: 12px; }

input,
select,
textarea {
  width: 100%;
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  color: var(--ink);
  padding: 9px 10px;
  outline: none;
}

textarea {
  min-height: 76px;
  resize: vertical;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--ink);
}

.field-note {
  margin: 4px 0 0;
  color: var(--accent);
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 13px;
  line-height: 1.6;
}

.field-note[hidden] { display: none; }

.checkout,
.payment-section,
.admin {
  padding: clamp(28px, 4vw, 54px);
  border-top: 1px solid var(--line);
}

.checkout-grid,
.payment-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
  gap: 16px;
}

.form-panel,
.order-preview,
.payment-card,
.admin-panel {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--paper);
}

.form-panel,
.order-preview,
.payment-card {
  padding: 18px;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.field.full { grid-column: 1 / -1; }

.order-preview {
  display: grid;
  gap: 14px;
  align-content: start;
  background: var(--soft);
}

.preview-list {
  display: grid;
  gap: 8px;
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 13px;
  line-height: 1.6;
}

.preview-list div {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #e5e1dc;
}

.payment-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}

.payment-title h3 {
  font-size: clamp(24px, 3vw, 38px);
  font-weight: 500;
  color: var(--warm);
}

.bank-list {
  display: grid;
  gap: 12px;
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
}

.bank-list div {
  display: grid;
  grid-template-columns: 92px minmax(0, 1fr);
  gap: 14px;
  align-items: baseline;
}

.bank-list span {
  color: var(--muted);
  font-size: 13px;
}

.bank-list strong {
  font-size: 20px;
  font-weight: 700;
}

.qr-frame {
  display: grid;
  place-items: center;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
}

.qr-frame img {
  width: min(100%, 280px);
  height: auto;
  display: block;
}

.site-footer {
  padding: clamp(28px, 4vw, 54px);
  border-top: 1px solid var(--line);
  background: var(--soft);
}

.footer-inner {
  display: grid;
  grid-template-columns: minmax(0, 0.85fr) minmax(300px, 1.15fr);
  gap: clamp(20px, 4vw, 42px);
  align-items: stretch;
}

.footer-copy {
  display: grid;
  gap: 14px;
  align-content: start;
}

.footer-copy h2 {
  font-size: clamp(24px, 3vw, 34px);
  line-height: 1.2;
  font-weight: 500;
}

.footer-copy address {
  color: var(--muted);
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-style: normal;
  font-size: 14px;
  line-height: 1.8;
}

.footer-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.map-frame {
  width: 100%;
  min-width: 0;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
}

.map-frame iframe {
  width: 100%;
  height: clamp(260px, 24vw, 300px);
  display: block;
  border: 0;
}

.mail-flow {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  color: var(--muted);
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 13px;
  line-height: 1.65;
}

.admin {
  min-height: calc(100vh - 66px);
  background: var(--soft);
}

.admin-panel {
  overflow: hidden;
  background: #fff;
}

.admin-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px;
  border-bottom: 1px solid var(--line);
}

.status-dot {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--success);
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 13px;
}

.status-dot::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
}

.table-wrap { overflow: auto; }
table {
  width: 100%;
  min-width: 1120px;
  border-collapse: collapse;
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 12px;
  background: #fff;
}

th,
td {
  padding: 11px 10px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
  white-space: nowrap;
}

th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #fff;
  color: var(--muted);
  font-weight: 700;
}

.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 40;
  max-width: min(360px, calc(100vw - 36px));
  padding: 12px 14px;
  border: 1px solid var(--ink);
  border-radius: 6px;
  background: var(--paper);
  box-shadow: 0 18px 40px rgba(48, 57, 67, 0.12);
  color: var(--ink);
  transform: translateY(140%);
  transition: transform 160ms ease;
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
  font-size: 13px;
}

.toast.show { transform: translateY(0); }

@media (max-width: 1160px) {
  .page-shell,
  .checkout-grid,
  .payment-grid,
  .footer-inner {
    grid-template-columns: 1fr;
  }
  .cart-panel { position: static; }
}

@media (max-width: 820px) {
  .site-header {
    align-items: flex-start;
    flex-direction: column;
    min-height: auto;
  }
  .nav {
    width: 100%;
    overflow-x: auto;
    padding-bottom: 3px;
  }
  .products { grid-template-columns: 1fr; }
  .product-card { grid-template-columns: 138px minmax(0, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
}

@media (max-width: 540px) {
  .page-shell,
  .checkout,
  .payment-section,
  .admin,
  .site-footer {
    padding-left: 16px;
    padding-right: 16px;
  }
  .brand img { width: clamp(148px, 48vw, 210px); }
  h1 {
    font-size: clamp(28px, 8vw, 38px);
    white-space: normal;
  }
  .map-frame iframe { height: 240px; }
  .product-card { grid-template-columns: 1fr; }
  .variant-grid { grid-template-columns: 1fr; }
  .section-heading { align-items: start; flex-direction: column; }
}
</style>
</head>
<body>

  <header class="site-header">
    <a class="brand" href="./index.html" aria-label="Omar Standard Cafe">
      <img src="./assets/logo-main-transparent.png" alt="Omar Standard Cafe" />
    </a>
    <nav class="nav" aria-label="後台導覽">
      <a href="./index.html">前台</a>
    </nav>
  </header>

  <main class="admin">
    <div class="section-heading">
      <div>
        <p class="eyebrow">ADMIN</p>
        <h1>訂單資料管理</h1>
      </div>
      <p class="section-lead">後台可查看訂單資料，並下載成會計管理使用的表格格式。</p>
    </div>

    <div class="admin-panel">
      <div class="admin-toolbar">
        <span class="status-dot">僅限指定帳號使用</span>
        <div class="nav">
          <button type="button" id="downloadPreview">下載 CSV</button>
          <button type="button" id="notifyPreview">重新整理</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>訂單編號</th>
              <th>客戶姓名</th>
              <th>商品名稱</th>
              <th>規格</th>
              <th>數量</th>
              <th>單價</th>
              <th>金額</th>
              <th>售出金額</th>
              <th>配送方式</th>
              <th>備註</th>
              <th>發票號碼</th>
              <th>發票金額</th>
              <th>收款日期</th>
              <th>是否已出貨</th>
            </tr>
          </thead>
          <tbody id="adminRows">
            <tr><td colspan="14">目前尚無訂單</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

<script>
const headers = ["訂單編號","客戶姓名","商品名稱","規格","數量","單價","金額","售出金額","配送方式","備註","發票號碼","發票金額","收款日期","是否已出貨"];
let orderRows = [];

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");
  window.clearTimeout(showToast.timer);
  showToast.timer = window.setTimeout(function() { toast.classList.remove("show"); }, 1800);
}

function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, function(char) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
  });
}

function csvCell(value) {
  return '"' + String(value == null ? "" : value).replace(/"/g, '""') + '"';
}

function authHeaders() {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get("token");
  if (urlToken) localStorage.setItem("omar-standard-admin-token", urlToken);
  const token = urlToken || localStorage.getItem("omar-standard-admin-token");
  return token ? { "x-admin-token": token } : {};
}

function renderRows() {
  const body = document.getElementById("adminRows");
  if (!orderRows.length) {
    body.innerHTML = '<tr><td colspan="14">目前尚無訂單</td></tr>';
    return;
  }
  body.innerHTML = orderRows.map(function(row) {
    return '<tr>' + headers.map(function(header) {
      return '<td>' + escapeHtml(row[header] || "") + '</td>';
    }).join("") + '</tr>';
  }).join("");
}

async function loadOrders() {
  const body = document.getElementById("adminRows");
  body.innerHTML = '<tr><td colspan="14">讀取訂單中...</td></tr>';
  try {
    const response = await fetch("/api/admin/orders", { headers: authHeaders() });
    const result = await response.json().catch(function() { return {}; });
    if (!response.ok) throw new Error(result.error || "無法讀取訂單資料");
    orderRows = result.rows || [];
    renderRows();
    showToast("訂單資料已更新");
  } catch (error) {
    orderRows = [];
    body.innerHTML = '<tr><td colspan="14">' + escapeHtml(error.message) + '</td></tr>';
    showToast(error.message);
  }
}

function downloadCsv() {
  const rows = [headers].concat(orderRows.map(function(row) {
    return headers.map(function(header) { return row[header] || ""; });
  }));
  const csv = rows.map(function(row) { return row.map(csvCell).join(","); }).join("\n");
  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "omar-standard-orders.csv";
  link.click();
  URL.revokeObjectURL(url);
}

document.getElementById("downloadPreview").addEventListener("click", downloadCsv);
document.getElementById("notifyPreview").addEventListener("click", function() {
  loadOrders();
});
loadOrders();
</script>
</body>
</html>
